kind = "web"
previewPath = "/"
title = "Square AI Academy"
version = "1.0.0"
id = "artifacts/square-ai-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19525

[services.development]
run = "pnpm --filter @workspace/square-ai-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/square-ai-academy", "run", "build" ]
publicDir = "artifacts/square-ai-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19525"
BASE_PATH = "/"
